name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  P4_VERSION: r24.2
  JJ_VERSION: "0.39.0"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint (stylua)
    steps:
      - uses: actions/checkout@v4

      - name: Cache stylua binary
        id: cache-stylua
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stylua
          key: stylua-2.4.1-luajit-linux-x86_64

      - name: Install stylua (luajit feature)
        if: steps.cache-stylua.outputs.cache-hit != 'true'
        run: cargo install stylua --locked --version 2.4.1 --features luajit

      - name: Check formatting
        run: stylua --check lua/ scripts/

  config-schema:
    runs-on: ubuntu-latest
    name: Config schema drift check
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Check DiffviewConfig sync with M.defaults
        run: make check-config-schema

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    name: Test (Neovim ${{ matrix.neovim }})
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Cache VCS tool binaries
        id: cache-vcs
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: vcs-tools-linux-x86_64-p4-${{ env.P4_VERSION }}-jj-${{ env.JJ_VERSION }}

      - name: Install VCS tools
        if: steps.cache-vcs.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin

          # Perforce
          curl -sL "https://cdist2.perforce.com/perforce/${{ env.P4_VERSION }}/bin.linux26x86_64/p4" \
            -o ~/.local/bin/p4
          curl -sL "https://cdist2.perforce.com/perforce/${{ env.P4_VERSION }}/bin.linux26x86_64/p4d" \
            -o ~/.local/bin/p4d
          chmod +x ~/.local/bin/p4 ~/.local/bin/p4d

          # Jujutsu
          curl -sL "https://github.com/jj-vcs/jj/releases/download/v${{ env.JJ_VERSION }}/jj-v${{ env.JJ_VERSION }}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C ~/.local/bin ./jj
          chmod +x ~/.local/bin/jj

      - name: Install Mercurial
        run: pip install mercurial

      - name: Run tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make test
